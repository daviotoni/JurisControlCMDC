name: Typecheck mobile

# Roda o type-check do TypeScript (tsc --noEmit) e os testes de tela (jest-expo
# + @testing-library/react-native) do app mobile (Expo/RN), pegando erros de
# tipo e regressões de UI antes de chegarem ao app. Job próprio e isolado: só
# dispara quando o mobile/ muda, e não afeta os testes rápidos nem o site.
# (Os dois passos ficam no mesmo job para pagar o npm ci uma vez só.)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/typecheck-mobile.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/typecheck-mobile.yml'

defaults:
  run:
    working-directory: mobile

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test -- --ci
